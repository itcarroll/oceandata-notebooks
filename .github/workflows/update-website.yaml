name: Update website
on:
  workflow_dispatch:
jobs:
  call:
    uses: ./.github/workflows/build-website.yaml
  deploy:
    needs: call
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish
        id: deployment
        uses: actions/deploy-pages@v4
