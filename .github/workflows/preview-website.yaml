name: Preview website
on:
  pull_request:
    branches:
      - main
jobs:
  call:
    uses: ./.github/workflows/build-website.yaml
  deploy:
    needs: call
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish
        id: deployment
        uses: actions/deploy-pages@v4

# can i use gh-pages fork as a deploy target?
# submitter would fork and pr
# - deployment would come from whichever branch
# - would have to create a PR comment
# - would need multiple forks if working on multiple PRs
# anyone looking at the PR could see it