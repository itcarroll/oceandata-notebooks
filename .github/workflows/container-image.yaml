name: Container image
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/container-image.yaml
      - container/**
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout container files
        uses: actions/checkout@v5
        with:
          sparse-checkout: container
      - name: Repository metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=true
          labels: |
            org.opencontainers.image.description="TODO"
            repo2docker.repo="https://github.com/${{ github.repository }}"
            repo2docker.ref="${{ github.ref }}"
      - name: Build args
        id: env
        run: |
          echo '${{ steps.meta.outputs.json }}' | jq '.tags[0] | "LABELS=\"" + . + "\""' >> "$GITHUB_ENV"
      # echo "LABELS=${{ fromJSON(steps.meta.outputs.json).tags[0] }}" >> "$GITHUB_ENV"
      # echo '${{ steps.meta.outputs.json }}' | jq -r '.labels | to_entries | map("\(.key)=\"\(.value)\"") | join(" ") | "LABELS=\"" + . + "\""'
      - name: Debug
        run: echo ${LABELS}
