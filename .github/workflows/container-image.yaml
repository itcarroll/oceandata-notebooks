name: Container image
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/container-image.yaml
      - container/**
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout container files
        uses: actions/checkout@v5
        with:
          sparse-checkout: container
      - name: Repository metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=true
          sep-tags: " "
          labels: |
            org.opencontainers.image.description='README\nXYZ'
          sep-labels: " "
      - name: Debug labels
        run: echo ${{ steps.meta.outputs.labels }}
      - name: Debug tags
        run: echo ${{ join(fromJSON(steps.meta.outputs.json).tags, ' --tag=' }}
