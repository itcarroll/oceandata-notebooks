name: Container image
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/container-image.yml
      - container/**
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      registry: ghcr.io
    permissions:
      contents: read
      packages: write
    steps:
      # - name: Export variables
      #   uses: actions/github-script@v8
      #   with:
      #     script: |
      #       const registry = process.env.REGISTRY
      #       const repo = process.env.GITHUB_REPOSITORY
      #       const hash = process.env.GITHUB_SHA.substring(0, 12)
      #       core.exportVariable('INPUT_IMAGE_NAME', `${registry}/${repo}`)
      #       core.exportVariable('SHA_NAME', `${registry}/${repo}:${hash}`)
      - name: Checkout container files
        uses: actions/checkout@v5
        with:
          sparse-checkout: container
      - name: Repository metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.registry }}/${{ github.repository }}
          tags: |
            type=sha,prefix=
      - name: Authenticate with registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          cache: 'pip'
      - name: Install repo2docker
        run: pip install jupyter-repo2docker
      - name: Run repo2docker
        run: >
          jupyter-repo2docker
          --no-run
          --user-id 1000
          --user-name jovyan
          --subdir container
          --image-name ${{ github.repository }}
          --target-repo-dir /srv/container
          --appendix "$(< ${PWD}/container/appendix)"
          --label "${{ steps.meta.outputs.labels }}"
          --DockerEngine.extra_buildx_build_args="--cache-from=type=registry,ref=${{ steps.meta.outputs.json.tags[0] }}:buildcache"
          --DockerEngine.extra_buildx_build_args="--cache-to=type=registry,ref=${{ steps.meta.outputs.json.tags[0] }}:buildcache,mode=max"
          ${PWD}
      - name: Push
        run: |
          docker tag ${{ github.repository }} ${{ steps.meta.outputs.tags }}
