name: Container image
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/container-image.yml
      - container/**
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout container files
        uses: actions/checkout@v5
        with:
          sparse-checkout: container
      - name: Repository metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
          labels: |
            org.opencontainers.image.description=ABC
      - name: Authenticate with registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          cache: 'pip'
      - name: Install repo2docker
        run: pip install jupyter-repo2docker
      - name: Run repo2docker
        run: |
          LABELS='${{ steps.meta.outputs.labels }}'
          jupyter-repo2docker \
            --no-run \
            --user-id 1000 \
            --user-name jovyan \
            --subdir container \
            --image-name ${IMAGE_NAME} \
            --target-repo-dir /srv/container \
            --appendix "$(< ${PWD}/container/appendix)" \
            --label "${LABELS//$'\n'/ }" \
            --DockerEngine.extra_buildx_build_args="--cache-from=type=registry,ref=${IMAGE_NAME}:buildcache" \
            --DockerEngine.extra_buildx_build_args="--cache-to=type=registry,ref=${IMAGE_NAME}:buildcache,mode=max" \
            ${PWD}
      - name: Push
        run: |
          docker tag ${IMAGE_NAME} ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
