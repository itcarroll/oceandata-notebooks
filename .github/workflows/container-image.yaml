name: Container image
on:
  push:
    paths: &paths
      - .github/workflows/container-image.yaml
      - container/**
    branches:
      - main
  pull_request:
    paths: *paths
  schedule:
    - cron: '32 16 * * *'
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      PACKAGE: oceandata-jupyterlab
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1
    permissions:
      packages: write
    steps:
      - name: Checkout container files
        uses: actions/checkout@v6
        with:
          sparse-checkout: container
      - name: Repository metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PACKAGE }}
          tags: |
            type=sha,prefix=
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
          labels: |
            org.opencontainers.image.title=${{ env.PACKAGE }}
            org.opencontainers.image.description=environment_with_JupyterLab_for_the_oceandata-notebooks
            repo2docker.repo=https://github.com/${{ github.repository }}
            repo2docker.ref=${{ github.ref }}
      - name: Build args
        run: |
          echo "CACHE=$REGISTRY/$GITHUB_REPOSITORY_OWNER/$PACKAGE:cache" >> "$GITHUB_ENV"
          TAGS=($DOCKER_METADATA_OUTPUT_TAGS)
          echo "IMAGE_TAG=${TAGS[0]}" >> "$GITHUB_ENV"
          echo "EXTRA_TAG=${TAGS[1]}" >> "$GITHUB_ENV"
          LABELS=($DOCKER_METADATA_OUTPUT_LABELS)
          LABELS=${LABELS[@]/#/--label }
          echo "LABELS=$LABELS" >> "$GITHUB_ENV"
      - name: Authenticate with registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Inspect registry
        run: |
          EXTRA_DIGEST=$(docker buildx imagetools inspect --format '{{json .Manifest.Digest}}' "$EXTRA_TAG" || echo "")
          echo "EXTRA_DIGEST=$EXTRA_DIGEST" >> "$GITHUB_ENV"
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          cache: pip
          pip-install: jupyter-repo2docker
      - name: Run repo2docker
        run: >
          jupyter-repo2docker
          --push
          --no-run
          --user-id 1000
          --user-name jovyan
          --subdir container
          --target-repo-dir /srv/container
          --appendix "$(< $PWD/container/appendix)"
          --image-name "$IMAGE_TAG"
          --DockerEngine.extra_buildx_build_args=--cache-from="type=registry,ref=$CACHE"
          --DockerEngine.extra_buildx_build_args=--cache-to="type=registry,ref=$CACHE,mode=max"
          $LABELS
          $PWD
      - name: Cleanup registry
        run: |
          IMAGE_DIGEST=$(docker buildx imagetools inspect --format '{{json .Manifest.Digest}}' "$IMAGE_TAG")
          if [[ "$IMAGE_DIGEST" == "$EXTRA_DIGEST" ]]; then
            docker buildx imagetools create --prefer-index=false --tag "$IMAGE_TAG" "$EXTRA_TAG"
          elif [[ -n "$EXTRA_TAG" ]]; then
            docker buildx imagetools create --prefer-index=false --tag "$EXTRA_TAG" "$IMAGE_TAG"
          fi
